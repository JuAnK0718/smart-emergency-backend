# ── SIGEU Backend Configuration ──

# Server port — Render sets PORT automatically via environment variable
server.port=${PORT:8080}

# Application name
spring.application.name=sigeu-backend

# Show clean error messages (not full stack traces) in responses
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# JSON formatting
spring.jackson.serialization.indent-output=true
